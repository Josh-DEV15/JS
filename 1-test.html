<!DOCTYPE html>
<html>
    <head>
        <title>Simple DOM example</title>
    </head>
    <body>
        <h2>Change Text Example</h2>

        <p id="message">Hello, welcome!</p>
        <button onclick="changeText()">Click Me</button>

        <script>
            function changeText() {
                document.getElementById('message').innerHTML = "Hello my People"
            }
        </script>
    </body>
</html>
